
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e293b" />
    <meta name="background-color" content="#f1f5f9" />
    <meta name="description" content="IIC - AI-driven Educational Platform for CBSE, BSEB and Competitive Exams. Notes, MCQs, Audio, Video and Live Tests." />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Android / generic PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="IIC">
    <meta name="msapplication-TileColor" content="#1e293b">
    <meta name="msapplication-TileImage" content="/pwa-192x192.png">

    <link rel="manifest" href="/manifest.webmanifest">

    <title>IIC - Educational Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Text:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <!-- KaTeX CSS for Math/Science Formulas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .markdown-body h1 { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; margin-top: 1em; color: #1e293b; }
      .markdown-body h2 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; margin-top: 1em; color: #334155; }
      .markdown-body h3 { font-size: 1.25em; font-weight: bold; margin-bottom: 0.5em; margin-top: 1em; color: #475569; }
      .markdown-body p { margin-bottom: 1em; line-height: 1.7; color: #374151; }
      .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
      .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
      .markdown-body li { margin-bottom: 0.5em; }
      .markdown-body strong { font-weight: 600; color: #0f172a; }
      .markdown-body blockquote { border-left: 4px solid #3b82f6; padding-left: 1em; font-style: italic; color: #4b5563; background: #f8fafc; padding: 1rem; border-radius: 0 0.5rem 0.5rem 0; }
      .markdown-body code { background-color: #f1f5f9; padding: 0.2em 0.4em; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
      .markdown-body pre { background-color: #1e293b; color: #f8fafc; padding: 1em; border-radius: 8px; overflow-x: auto; margin-bottom: 1em; }
      .markdown-body pre code { background-color: transparent; padding: 0; color: inherit; }
      
      /* Formula Styling */
      .math-formula {
          font-size: 1.1em;
          padding: 0 4px;
      }

      /* Notes HTML content: ensure full-width fluid layout for AI-generated notes
         (Tailwind Typography plugin is not available via CDN, so we replicate
         essential prose styles + force full-width on every descendant). */
      .notes-html-content {
          width: 100%;
          max-width: 100%;
          color: #1e293b;
          font-family: 'Inter', sans-serif;
          line-height: 1.7;
      }
      .notes-html-content > * { max-width: 100% !important; }
      .notes-html-content img,
      .notes-html-content video,
      .notes-html-content iframe {
          max-width: 100%;
          height: auto;
          display: block;
          margin: 1rem auto;
          border-radius: 8px;
      }
      .notes-html-content table {
          width: 100%;
          border-collapse: collapse;
          margin: 1em 0;
          display: block;
          overflow-x: auto;
      }
      .notes-html-content th,
      .notes-html-content td {
          border: 1px solid #e2e8f0;
          padding: 8px 12px;
          text-align: left;
      }
      .notes-html-content th { background: #f1f5f9; font-weight: 600; }
      .notes-html-content h1 { font-size: 1.875em; font-weight: 800; margin: 1.2em 0 0.5em; color: #0f172a; line-height: 1.2; }
      .notes-html-content h2 { font-size: 1.5em; font-weight: 800; margin: 1.2em 0 0.5em; color: #1e293b; line-height: 1.3; }
      .notes-html-content h3 { font-size: 1.25em; font-weight: 700; margin: 1em 0 0.4em; color: #334155; }
      .notes-html-content h4 { font-size: 1.1em; font-weight: 700; margin: 0.8em 0 0.3em; color: #475569; }
      .notes-html-content p { margin: 0.75em 0; color: #334155; }
      .notes-html-content ul { list-style: disc; padding-left: 1.5em; margin: 0.75em 0; }
      .notes-html-content ol { list-style: decimal; padding-left: 1.5em; margin: 0.75em 0; }
      .notes-html-content li { margin-bottom: 0.4em; color: #334155; }
      .notes-html-content strong { font-weight: 700; color: #0f172a; }
      .notes-html-content em { font-style: italic; }
      .notes-html-content blockquote {
          border-left: 4px solid #3b82f6;
          padding: 0.75rem 1rem;
          margin: 1em 0;
          background: #f8fafc;
          color: #475569;
          border-radius: 0 8px 8px 0;
      }
      .notes-html-content code {
          background: #f1f5f9;
          padding: 0.15em 0.4em;
          border-radius: 4px;
          font-family: 'Courier New', monospace;
          font-size: 0.92em;
          color: #be185d;
      }
      .notes-html-content pre {
          background: #1e293b;
          color: #f8fafc;
          padding: 1em;
          border-radius: 8px;
          overflow-x: auto;
          margin: 1em 0;
      }
      .notes-html-content pre code { background: transparent; color: inherit; padding: 0; }
      .notes-html-content a { color: #2563eb; text-decoration: underline; }
      .notes-html-content hr { border: 0; border-top: 1px solid #e2e8f0; margin: 1.5em 0; }
      @media (min-width: 768px) {
          .notes-html-content { font-size: 17px; }
          .notes-html-content h1 { font-size: 2.25em; }
          .notes-html-content h2 { font-size: 1.75em; }
      }
      /* Override any .container / .wrapper / body wrappers inside user HTML notes
         so they don't add extra max-width, margins, or padding that create whitespace */
      .notes-html-content .container,
      .notes-html-content .wrapper,
      .notes-html-content .content,
      .notes-html-content .card,
      .notes-html-content main,
      .notes-html-content article,
      .notes-html-content section {
          max-width: 100% !important;
          width: 100% !important;
          margin-left: 0 !important;
          margin-right: 0 !important;
          padding-left: 0 !important;
          padding-right: 0 !important;
          box-sizing: border-box !important;
      }
      /* body/html inside HTML notes should not add background or extra spacing */
      .notes-html-content body,
      .notes-html-content html { margin: 0 !important; padding: 0 !important; background: transparent !important; }
      /* section-box style divs — keep vertical padding but remove horizontal */
      .notes-html-content [class*="section"],
      .notes-html-content [class*="box"] {
          padding-left: 8px !important;
          padding-right: 8px !important;
          box-sizing: border-box !important;
      }
      /* ── CARD FLATTENING: Remove floating card effects from all div/section containers
         so admin HTML renders as a clean flowing document, not multiple floating cards.
         CSS !important overrides inline style="" attributes that lack !important. ── */
      .notes-html-content div,
      .notes-html-content section,
      .notes-html-content article,
      .notes-html-content aside,
      .notes-html-content header,
      .notes-html-content footer,
      .notes-html-content main {
          box-shadow: none !important;
          border: none !important;
          border-radius: 0 !important;
          max-width: 100% !important;
          width: auto !important;
          margin-left: 0 !important;
          margin-right: 0 !important;
          float: none !important;
          position: relative !important;
      }
      /* Keep top/bottom margins small so sections don't gap too much */
      .notes-html-content div + div,
      .notes-html-content section + section {
          margin-top: 0.5em !important;
      }
      /* Keep colored backgrounds (admin's section headers) but strip card styling */
      /* Tables, images, code blocks keep their own styling */
      .notes-html-content table,
      .notes-html-content img,
      .notes-html-content video,
      .notes-html-content iframe,
      .notes-html-content pre,
      .notes-html-content code {
          border-radius: 8px !important;
      }
      .notes-html-content table {
          border: 1px solid #e2e8f0 !important;
          border-radius: 8px !important;
      }
    </style>
<link rel="stylesheet" href="/index.css">
<style>
  /* Hides the Google Translate top banner/frame completely */
  .goog-te-banner-frame.skiptranslate { display: none !important; }
  /* Resets the 40px margin Google Translate adds to the body */
  body { top: 0px !important; position: static !important; }
  /* Hides the original text tooltip popups that appear on hover */
  .goog-tooltip { display: none !important; }
  .goog-tooltip:hover { display: none !important; }
  .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }
  /* Optional: Hide the Google Translate widget completely if it decides to pop up */
  #goog-gt-tt { display: none !important; }
</style>
</head>
  <body class="bg-slate-200 text-slate-900 min-h-[100dvh] flex justify-center translate-body">
    <!-- Google Translate Script -->
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'hi,en',
            autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- Google Model Viewer for 3D Models -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <div id="root" class="w-full bg-slate-50 min-h-[100dvh] shadow-2xl relative overflow-x-hidden"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
